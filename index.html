<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>咪咕鸟游戏 - 原创网页游戏</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="nav">
    <a href="/" class="nav-brand">咪咕鸟游戏</a>
  </nav>

  <main>
    <div class="page-header">
      <h1>🎮 游戏列表</h1>
      <p>原创网页游戏，欢迎来玩</p>
    </div>

    <div class="game-grid">
      <!-- Minesweeper -->
      <a href="/games/minesweeper/" class="game-card">
        <div class="game-card-thumb minesweeper">
          💣
        </div>
        <div class="game-card-body">
          <div class="game-card-title">扫雷</div>
          <div class="game-card-desc">经典扫雷游戏。点击翻开格子，右键标记地雷，数字提示周围地雷数量。</div>
          <div class="game-card-tag">益智 · 经典</div>
          <div class="game-card-play">开始游戏 →</div>
        </div>
      </a>
    </div>
  </main>

  <footer class="footer">
    <p>© 2026 咪咕鸟游戏 · 原创网页游戏</p>
  </footer>
</body>
</html>
