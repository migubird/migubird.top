      * {
        margin: 0;
        padding: 0;

      #game-container canvas {
        display: block;
        margin: auto;
        touch-action: none;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;

      .footer-beian {

        z-index: 999;

      .footer-beian a {
        color: inherit;

        pointer-events: auto;
      }
